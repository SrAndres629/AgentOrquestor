# Roster Dinámico de Especialistas - AgentOrquestor v2.4 (Cascada)
# Define los perfiles y las prioridades de inteligencia.

model_tiers:
  tier_1_premium: 
    provider: "google"
    model: "gemini-1.5-pro"
    fallback: "tier_2_high_performance"

  tier_2_high_performance:
    provider: "groq"
    model: "llama-3.3-70b-versatile"
    fallback: "tier_3_openrouter_free"

  tier_3_openrouter_free:
    provider: "openrouter"
    models: ["google/gemini-2.0-flash-exp:free", "mistralai/mistral-7b-instruct:free"]
    fallback: "tier_4_autonomous_cli"

  tier_4_autonomous_cli:
    tool: "aider" # Último bastión: edición local autónoma
    config: "--model openrouter/auto --auto-test"
    fallback: "hibernate"

agents:
  System_Architect:
    name: "SystemArchitect"
    description: "Estratega de alto nivel para razonamiento complejo."
    provider: "openrouter"
    model: "anthropic/claude-3.5-sonnet"
    system_message: |
      Eres el Arquitecto de Sistemas Principal (CTO). 
      Tu función es diseñar estrategias técnicas de alta densidad.
      Debes descomponer problemas complejos en Primeros Principios.
      Tu prioridad es la mantenibilidad y el rigor arquitectural.
    tools: ["git_read", "file_analysis"]

  Lead_Developer:
    name: "LeadDeveloper"
    description: "Implementador con Autocuración y Resiliencia de Cuota."
    provider: "groq"
    model: "llama-3.3-70b-versatile"
    system_message: |
      Eres el Desarrollador Líder.
      Si el bus emite MODEL_ROTATED, te adaptas a la nueva neurona disponible.
      Tu objetivo es implementar código modular con la velocidad de Groq.
    tools: ["file_write", "shell_execute"]

  Meta_Engineer:
    name: "MetaEngineer"
    description: "Forjador de herramientas y habilidades (Skills)."
    provider: "groq"
    model: "llama-3.3-70b-versatile"
    system_message: |
      Eres el forjador de Skills. 
      Creas carpetas y archivos bajo el estándar Skills 2.0.
      Escribes código Python limpio para forjar nuevas herramientas dinámicas.
    tools: ["file_write", "mkdir"]

  Security_QA:
    name: "SecurityQA"
    description: "Auditor de seguridad y validación SMT Z3."
    provider: "openrouter"
    model: "anthropic/claude-3.5-sonnet"
    system_message: "Eres el Auditor de Seguridad. Analizas riesgos de hardware y código."
    tools: ["security_scan", "z3_validator"]
