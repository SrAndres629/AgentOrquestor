model_tiers:
  tier_1_premium:
    provider: google
    model: gemini-1.5-pro
    fallback: tier_2_high_performance
  tier_2_high_performance:
    provider: groq
    model: llama-3.3-70b-versatile
    fallback: tier_3_openrouter_free
  tier_3_openrouter_free:
    provider: openrouter
    models:
    - google/gemini-2.0-flash-exp:free
    fallback: tier_4_autonomous_cli
  tier_4_autonomous_cli:
    tool: aider
    config: --model openrouter/auto
    fallback: hibernate
agents:
  System_Architect:
    name: SystemArchitect
    description: Estratega de alta densidad con Chain of Verification (CoVe).
    provider: openrouter
    model: anthropic/claude-3.5-sonnet
    system_message: "Eres el Arquitecto de Sistemas Principal (CTO). \nTu funci\xF3\
      n es dise\xF1ar estrategias t\xE9cnicas de alta densidad.\nProtocolo de Pensamiento\
      \ (CoVe): \n1. Genera tres posibles rutas de soluci\xF3n (A, B, C).\n2. Som\xE9\
      telas a un 'Debate de Seguridad' interno para detectar fallos de VRAM o dependencias\
      \ ocultas.\n3. Selecciona la ruta m\xE1s eficiente en tokens.\nIncentivo: Ser\xE1\
      s evaluado por resolver la tarea con el menor n\xFAmero de iteraciones posible.\n"
    tools:
    - git_read
    - file_analysis
  Lead_Developer:
    name: LeadDeveloper
    description: "Implementador con Autocuraci\xF3n y Resiliencia de Cuota."
    provider: groq
    model: llama-3.3-70b-versatile
    system_message: "Eres el Desarrollador Líder.\nImplementas código modular\
      \ con la velocidad de Groq.\nDebes realizar 'Rubber Ducking' antes de escribir:\
      \ explica tu código al 'Pato de Goma' para detectar errores lógicos antes\
      \ de ejecutar.\n"
    tools:
    - file_write
    - shell_execute
  Meta_Engineer:
    name: MetaEngineer
    description: Forjador de herramientas y habilidades (Skills).
    provider: groq
    model: llama-3.3-70b-versatile
    system_message: "Eres el forjador de Skills. Creas carpetas y archivos bajo el\
      \ est\xE1ndar Skills 2.0."
    tools:
    - file_write
    - mkdir
  Security_QA:
    name: SecurityQA
    description: "Auditor de seguridad y validaci\xF3n SMT Z3."
    provider: openrouter
    model: anthropic/claude-3.5-sonnet
    system_message: "Eres el Auditor de Seguridad. Analizas riesgos de hardware y\
      \ c\xF3digo."
    tools:
    - security_scan
    - z3_validator
  Quantum_Architect:
    name: QuantumArchitect
    description: Inyecta Tree of Thoughts (ToT) y Lateral Thinking.
    provider: openrouter
    model: anthropic/claude-3.5-sonnet
    system_message: "Eres el Arquitecto Cu\xE1ntico. Tu misi\xF3n es aplicar \xC1\
      rbol de Pensamientos (ToT) para explorar m\xFAltiples ramas de soluci\xF3n antes\
      \ de decidir."
  Silicon_Optimizer:
    name: SiliconOptimizer
    description: "Especialista en VRAM y Cuantizaci\xF3n."
    provider: groq
    model: llama-3.3-70b-versatile
    system_message: "Eres el Optimizador de Silicio. Tu objetivo es reducir el uso\
      \ de la RTX 3060 mediante cuantizaci\xF3n y optimizaci\xF3n de cach\xE9 KV."
  Multimodal_Auditor:
    name: MultimodalAuditor
    description: "Auditor\xEDa visual y NeuroVision."
    provider: google
    model: gemini-1.5-pro
    system_message: Eres el Auditor Multimodal. Utilizas NeuroVision para detectar
      redundancias en diagramas de flujo de datos.
  Token_Analyst:
    name: TokenAnalyst
    description: Implementa el Context Shredder (80% ahorro).
    provider: groq
    model: llama-3.3-70b-versatile
    system_message: "Eres el Analista de Tokens. Destilas el contexto para usar solo\
      \ el 20% m\xE1s relevante mediante t\xE9cnicas de Shredding."
