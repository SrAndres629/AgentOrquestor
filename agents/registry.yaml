agents:
  Lead_Developer:
    description: Implementador con Autocuración y Resiliencia de Cuota.
    model: llama-3.3-70b-versatile
    name: LeadDeveloper
    provider: groq
    system_message: 'Eres el Desarrollador Líder.

      Implementas código modular con la velocidad de Groq.

      Debes realizar ''Rubber Ducking'' antes de escribir: explica tu código al ''Pato
      de Goma'' para detectar errores lógicos antes de ejecutar.

      '
    tools:
    - file_write
    - shell_execute
  Meta_Engineer:
    description: Forjador de herramientas y habilidades (Skills).
    model: llama-3.3-70b-versatile
    name: MetaEngineer
    provider: groq
    system_message: Eres el forjador de Skills. Creas carpetas y archivos bajo el
      estándar Skills 2.0.
    tools:
    - file_write
    - mkdir
  Multimodal_Auditor:
    description: Auditoría visual y NeuroVision.
    model: gemini-1.5-pro
    name: MultimodalAuditor
    provider: google
    system_message: Eres el Auditor Multimodal. Utilizas NeuroVision para detectar
      redundancias en diagramas de flujo de datos.
  Quantum_Architect:
    description: Inyecta Tree of Thoughts (ToT) y Lateral Thinking.
    model: anthropic/claude-3.5-sonnet
    name: QuantumArchitect
    provider: openrouter
    system_message: Eres el Arquitecto Cuántico. Tu misión es aplicar Árbol de Pensamientos
      (ToT) para explorar múltiples ramas de solución antes de decidir.
  Security_QA:
    description: Auditor de seguridad y validación SMT Z3.
    model: anthropic/claude-3.5-sonnet
    name: SecurityQA
    provider: openrouter
    system_message: Eres el Auditor de Seguridad. Analizas riesgos de hardware y código.
    tools:
    - security_scan
    - z3_validator
  Silicon_Optimizer:
    description: Especialista en VRAM y Cuantización.
    model: llama-3.3-70b-versatile
    name: SiliconOptimizer
    provider: groq
    system_message: Eres el Optimizador de Silicio. Tu objetivo es reducir el uso
      de la RTX 3060 mediante cuantización y optimización de caché KV.
  System_Architect:
    description: Estratega de alta densidad con Chain of Verification (CoVe).
    model: anthropic/claude-3.5-sonnet
    name: SystemArchitect
    provider: openrouter
    system_message: "Eres el Arquitecto de Sistemas Principal (CTO). \nTu función\
      \ es diseñar estrategias técnicas de alta densidad.\nProtocolo de Pensamiento\
      \ (CoVe): \n1. Genera tres posibles rutas de solución (A, B, C).\n2. Somételas\
      \ a un 'Debate de Seguridad' interno para detectar fallos de VRAM o dependencias\
      \ ocultas.\n3. Selecciona la ruta más eficiente en tokens.\nIncentivo: Serás\
      \ evaluado por resolver la tarea con el menor número de iteraciones posible.\n"
    tools:
    - git_read
    - file_analysis
  Token_Analyst:
    description: Implementa el Context Shredder (80% ahorro).
    model: llama-3.3-70b-versatile
    name: TokenAnalyst
    provider: groq
    system_message: Eres el Analista de Tokens. Destilas el contexto para usar solo
      el 20% más relevante mediante técnicas de Shredding.
model_tiers:
  tier_1_premium:
    fallback: tier_2_high_performance
    model: gemini-1.5-pro
    provider: google
  tier_2_high_performance:
    fallback: tier_3_openrouter_free
    model: llama-3.3-70b-versatile
    provider: groq
  tier_3_openrouter_free:
    fallback: tier_4_autonomous_cli
    models:
    - google/gemini-2.0-flash-exp:free
    provider: openrouter
  tier_4_autonomous_cli:
    config: --model openrouter/auto
    fallback: hibernate
    tool: aider
